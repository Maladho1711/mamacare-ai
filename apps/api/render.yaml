services:
  - type: web
    name: mamacare-api
    runtime: node
    region: frankfurt          # Latence réduite pour l'Europe / Afrique de l'Ouest
    plan: free                 # Passer à "starter" pour prod avec 0 cold start
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

      # ── Supabase ─────────────────────────────────────────────────────────
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false            # À renseigner dans le dashboard Render

      # ── Claude API (Anthropic) ────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── WhatsApp Business API ─────────────────────────────────────────────
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false

      # ── Africa's Talking (SMS fallback) ───────────────────────────────────
      - key: AFRICA_TALKING_API_KEY
        sync: false
      - key: AFRICA_TALKING_USERNAME
        sync: false

      # ── CORS : domaine Vercel du frontend ─────────────────────────────────
      - key: FRONTEND_URL
        sync: false            # ex : https://mamacare.vercel.app

      # ── Secret partagé avec le cron (protection endpoint interne) ─────────
      - key: INTERNAL_CRON_SECRET
        sync: false

  # ══════════════════════════════════════════════════════════════════════════
  # Cron — rappels quotidiens questionnaire (8h00 UTC = 8h00 Conakry)
  # Déclenche POST /notifications/send-daily-reminders toutes les 24h.
  # ══════════════════════════════════════════════════════════════════════════
  - type: cron
    name: mamacare-daily-reminders
    runtime: node
    region: frankfurt
    plan: free
    rootDir: apps/api
    schedule: "0 8 * * *"
    buildCommand: npm install
    startCommand: |
      curl -sS -X POST \
        -H "x-internal-secret: $INTERNAL_CRON_SECRET" \
        -H "Content-Type: application/json" \
        "$API_URL/notifications/send-daily-reminders"
    envVars:
      - key: API_URL
        value: https://mamacare-api.onrender.com
      - key: INTERNAL_CRON_SECRET
        sync: false

  # ══════════════════════════════════════════════════════════════════════════
  # Cron — rappels de rendez-vous J-1 (18h00 UTC la veille du RDV)
  # Déclenche POST /appointments/send-reminders.
  # ══════════════════════════════════════════════════════════════════════════
  - type: cron
    name: mamacare-appointment-reminders
    runtime: node
    region: frankfurt
    plan: free
    rootDir: apps/api
    schedule: "0 18 * * *"
    buildCommand: npm install
    startCommand: |
      curl -sS -X POST \
        -H "x-internal-secret: $INTERNAL_CRON_SECRET" \
        -H "Content-Type: application/json" \
        "$API_URL/appointments/send-reminders"
    envVars:
      - key: API_URL
        value: https://mamacare-api.onrender.com
      - key: INTERNAL_CRON_SECRET
        sync: false
