<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9177A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Heart shape (mother & child) -->
  <g transform="translate(256, 240)" fill="white">
    <!-- Main heart -->
    <path d="M0,40 C0,40 -120,-60 -120,-120 C-120,-170 -70,-190 -30,-170 C-10,-160 0,-140 0,-140 C0,-140 10,-160 30,-170 C70,-190 120,-170 120,-120 C120,-60 0,40 0,40 Z"
          transform="scale(1.4)" opacity="0.95"/>
    <!-- Small baby heart inside -->
    <path d="M0,15 C0,15 -35,-15 -35,-40 C-35,-55 -20,-60 -10,-55 C-3,-52 0,-45 0,-45 C0,-45 3,-52 10,-55 C20,-60 35,-55 35,-40 C35,-15 0,15 0,15 Z"
          fill="#E91E8C" opacity="0.8" transform="translate(0, -40)"/>
  </g>
  <!-- "MC" text at bottom -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="72" fill="white" opacity="0.9">MamaCare</text>
</svg>